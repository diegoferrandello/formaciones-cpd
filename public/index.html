<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formaciones CPD | Calendario</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF9F7;
      --surface: #FFFFFF;
      --surface-alt: #F5F3EF;
      --border: #E8E4DD;
      --border-light: #F0EDE8;
      --text: #1A1815;
      --text-secondary: #6B6560;
      --text-muted: #9C968F;
      --accent: #2D2926;
      --accent-warm: #8B6914;
      --accent-gold: #C49A2A;
      --accent-gold-light: #F5EDDA;
      --success: #2D7A4F;
      --success-light: #E8F5EE;
      --warning: #B8860B;
      --warning-light: #FFF8E7;
      --danger: #C0392B;
      --danger-light: #FDEEEC;
      --info: #2874A6;
      --info-light: #EBF5FB;
      --planificada: #2874A6;
      --confirmada: #8B6914;
      --realizada: #2D7A4F;
      --cancelada: #C0392B;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ─── LAYOUT ─── */
    .app-shell { display: flex; min-height: 100vh; }
    
    .sidebar {
      width: 260px;
      background: var(--accent);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .sidebar-sub {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
      font-weight: 500;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      transition: all 0.15s ease;
      color: rgba(255,255,255,0.65);
    }

    .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 500; }
    .nav-item svg { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .user-name { font-size: 13px; font-weight: 500; color: #fff; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.45); text-transform: capitalize; }

    .main-content {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-light);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn svg { width: 16px; height: 16px; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #1a1714; transform: translateY(-1px); box-shadow: var(--shadow-md); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--text-muted); }

    .btn-gold {
      background: var(--accent-gold);
      color: #fff;
    }
    .btn-gold:hover { background: #B08A20; }

    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #A93226; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 8px 12px;
    }
    .btn-ghost:hover { background: var(--surface-alt); color: var(--text); }

    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { padding: 8px; border-radius: var(--radius-sm); }

    /* ─── CALENDAR ─── */
    .calendar-container { padding: 24px 32px; }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .calendar-month {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      min-width: 200px;
      text-align: center;
    }

    .calendar-filters {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
    }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-chip:hover:not(.active) { border-color: var(--text-muted); }

    .view-toggle {
      display: flex;
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .view-btn {
      padding: 6px 14px;
      border: none;
      background: transparent;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }
    .view-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

    .calendar-grid {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border-light);
    }

    .weekday {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      min-height: 110px;
      padding: 8px;
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.12s ease;
      position: relative;
    }
    .calendar-day:nth-child(7n) { border-right: none; }
    .calendar-day:hover { background: var(--surface-alt); }
    .calendar-day.other-month { opacity: 0.35; }
    .calendar-day.today { background: var(--accent-gold-light); }

    .day-number {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .calendar-day.today .day-number {
      color: var(--accent-gold);
      font-weight: 700;
    }

    .day-events { display: flex; flex-direction: column; gap: 3px; }

    .day-event {
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: transform 0.1s ease;
    }
    .day-event:hover { transform: scale(1.02); }

    .day-event.planificada { background: var(--info-light); color: var(--planificada); border-left: 3px solid var(--planificada); }
    .day-event.confirmada { background: var(--warning-light); color: var(--confirmada); border-left: 3px solid var(--confirmada); }
    .day-event.realizada { background: var(--success-light); color: var(--realizada); border-left: 3px solid var(--realizada); }
    .day-event.cancelada { background: var(--danger-light); color: var(--cancelada); border-left: 3px solid var(--cancelada); text-decoration: line-through; }

    .day-more {
      font-size: 10px;
      color: var(--text-muted);
      padding: 2px 4px;
      font-weight: 500;
    }

    /* ─── WEEKLY VIEW ─── */
    .weekly-grid {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .weekly-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border-light);
    }

    .weekly-day-header {
      padding: 14px 12px;
      text-align: center;
    }

    .weekly-day-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .weekly-day-num {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-top: 2px;
    }

    .weekly-day-header.today .weekly-day-num { color: var(--accent-gold); }

    .weekly-body {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      min-height: 400px;
    }

    .weekly-column {
      border-right: 1px solid var(--border-light);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .weekly-column:last-child { border-right: none; }

    .weekly-event {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .weekly-event:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

    .weekly-event.planificada { background: var(--info-light); border-left: 3px solid var(--planificada); }
    .weekly-event.confirmada { background: var(--warning-light); border-left: 3px solid var(--confirmada); }
    .weekly-event.realizada { background: var(--success-light); border-left: 3px solid var(--realizada); }
    .weekly-event.cancelada { background: var(--danger-light); border-left: 3px solid var(--cancelada); }

    .weekly-event-time { font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .weekly-event-title { font-size: 12px; font-weight: 500; margin-top: 2px; }
    .weekly-event-loc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 580px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.25s ease;
    }

    .modal-header {
      padding: 22px 28px 16px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--surface-alt);
      border-radius: 50%;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-body { padding: 20px 28px 28px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select, .form-textarea {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s ease;
      outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px var(--accent-gold-light);
    }

    .form-textarea { resize: vertical; min-height: 70px; }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }

    /* ─── DETAIL PANEL ─── */
    .detail-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-status.planificada { background: var(--info-light); color: var(--planificada); }
    .detail-status.confirmada { background: var(--warning-light); color: var(--confirmada); }
    .detail-status.realizada { background: var(--success-light); color: var(--realizada); }
    .detail-status.cancelada { background: var(--danger-light); color: var(--cancelada); }

    .detail-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .planificada .detail-status-dot { background: var(--planificada); }
    .confirmada .detail-status-dot { background: var(--confirmada); }
    .realizada .detail-status-dot { background: var(--realizada); }
    .cancelada .detail-status-dot { background: var(--cancelada); }

    .detail-info {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 18px;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .detail-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--surface-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .detail-icon svg { width: 16px; height: 16px; color: var(--text-muted); }

    .detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { font-size: 14px; font-weight: 500; }

    .fotos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .foto-thumb {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border-light);
    }
    .foto-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ─── STATS CARDS ─── */
    .stats-container { padding: 24px 32px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 600; }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-top: 6px; }
    .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* ─── USERS TABLE ─── */
    .users-container { padding: 24px 32px; }

    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      padding: 14px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border-light);
    }

    .table td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid var(--border-light);
    }

    .table tr:last-child td { border-bottom: none; }
    .table tr:hover td { background: var(--surface-alt); }

    .role-badge {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .role-badge.admin { background: var(--accent-gold-light); color: var(--accent-gold); }
    .role-badge.formador { background: var(--info-light); color: var(--info); }

    /* ─── LIST VIEW ─── */
    .list-container { padding: 24px 32px; }

    .list-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 8px;
    }
    .list-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

    .list-date {
      text-align: center;
      min-width: 50px;
    }
    .list-date-day { font-size: 22px; font-weight: 700; color: var(--accent); }
    .list-date-month { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 600; }

    .list-info { flex: 1; }
    .list-title { font-size: 15px; font-weight: 600; }
    .list-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

    /* ─── LOGIN ─── */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2D2926 0%, #1a1714 50%, #2D2926 100%);
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .login-brand p {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .login-form { display: flex; flex-direction: column; gap: 18px; }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── API HELPER ───
const API = (() => {
  const base = window.location.origin;
  const getToken = () => localStorage.getItem('cpd_token');
  
  const request = async (path, opts = {}) => {
    const headers = { 'Content-Type': 'application/json' };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${base}${path}`, { ...opts, headers: { ...headers, ...opts.headers } });
    if (res.status === 401) { localStorage.removeItem('cpd_token'); localStorage.removeItem('cpd_user'); window.location.reload(); }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');
    return data;
  };

  return {
    login: (email, password) => request('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) }),
    me: () => request('/api/auth/me'),
    getFormaciones: (params) => request(`/api/formaciones?${new URLSearchParams(params)}`),
    getFormacion: (id) => request(`/api/formaciones/${id}`),
    createFormacion: (data) => request('/api/formaciones', { method: 'POST', body: JSON.stringify(data) }),
    updateFormacion: (id, data) => request(`/api/formaciones/${id}`, { method: 'PUT', body: JSON.stringify(data) }),
    deleteFormacion: (id) => request(`/api/formaciones/${id}`, { method: 'DELETE' }),
    getUsers: () => request('/api/users'),
    createUser: (data) => request('/api/users', { method: 'POST', body: JSON.stringify(data) }),
    updateUser: (id, data) => request(`/api/users/${id}`, { method: 'PUT', body: JSON.stringify(data) }),
    getStats: (params) => request(`/api/stats?${new URLSearchParams(params)}`),
    uploadFotos: async (id, files) => {
      const formData = new FormData();
      files.forEach(f => formData.append('fotos', f));
      const token = getToken();
      const res = await fetch(`${base}/api/formaciones/${id}/fotos`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      return res.json();
    }
  };
})();

// ─── ICONS ───

  Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>,
  ChevLeft: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>,

  Users: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,

  Edit: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
  Camera: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  List: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  Logout: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>,
  Menu: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  People: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>,
  Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
};

const TIPOS = { producto: 'Producto', tecnica_venta: 'Técnica de Venta', lanzamiento: 'Lanzamiento', otro: 'Otro' };
const CANALES = { call_center: 'Call Center', directo: 'Directo', directo_indirecto: 'Directo/Indirecto', drogueria: 'Droguería', hys: 'H&S', indirecto: 'Indirecto', interno_loreal: "Interno L'Oréal", interno_pharmexx: 'Interno Pharmexx', perfumeria: 'Perfumería' };
const MODALIDADES = { express: 'Express', presencial: 'Presencial', virtual: 'Virtual' };
const CATEGORIAS_OPCIONES = ['Hair Care', 'Hair Color', 'Make Up', 'Skin Care'];
const ESTADOS = { planificada: 'Planificada', confirmada: 'Confirmada', realizada: 'Realizada', cancelada: 'Cancelada' };
const MESES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
const DIAS = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

// ─── TOAST ───
function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{message}</div>;
}

// ─── LOGIN SCREEN ───
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      const { token, user } = await API.login(email, password);
      localStorage.setItem('cpd_token', token);
      localStorage.setItem('cpd_user', JSON.stringify(user));
      onLogin(user);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  };

  return (
    <div className="login-wrapper">
      <div className="login-card">
        <div className="login-brand">
          <h1>Formaciones CPD</h1>
          <p>Calendario</p>
        </div>
        <form className="login-form" onSubmit={handleSubmit}>
          {error && <div className="login-error">{error}</div>}
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="tu@email.com" required />
          </div>
          <div className="form-group">
            <label className="form-label">Contraseña</label>
            <input className="form-input" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required />
          </div>
          <button className="login-btn" type="submit" disabled={loading}>{loading ? 'Ingresando...' : 'Ingresar'}</button>
        </form>
      </div>
    </div>
  );
}

// ─── FORMACION MODAL ───
function FormacionModal({ show, onClose, onSave, formacion, users, currentUser }) {
  const emptyForm = { titulo: '', descripcion: '', tipo: 'producto', canal: '', modalidad: '', link_reunion: '', categorias: [], fecha: new Date().toISOString().split('T')[0], hora_inicio: '09:00', hora_fin: '11:00', cadena: '', pdv_nombre: '', pdv_direccion: '', ciudad: '', estado: 'planificada', asistentes_esperados: '', notas: '', formador_id: currentUser?.id };
  const [form, setForm] = useState(emptyForm);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (formacion) {
      setForm({ ...emptyForm, ...formacion, asistentes_esperados: formacion.asistentes_esperados || '' });
    } else {
      setForm(emptyForm);
    }
  }, [formacion, show]);

  if (!show) return null;

  const handleSave = async () => {
    setSaving(true);
    try {
      const payload = { ...form };
      if (payload.asistentes_esperados === '') delete payload.asistentes_esperados;
      else payload.asistentes_esperados = parseInt(payload.asistentes_esperados);
      await onSave(payload);
    } catch (e) {}
    setSaving(false);
  };

  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{formacion ? 'Editar Formación' : 'Nueva Formación'}</div>
          <button className="modal-close" onClick={onClose}><Icons.Close /></button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group full">
              <label className="form-label">Título *</label>
              <input className="form-input" value={form.titulo} onChange={e => set('titulo', e.target.value)} placeholder="Ej: Capacitación CeraVe Limpieza" />
            </div>
            <div className="form-group">
              <label className="form-label">Tipo</label>
              <select className="form-select" value={form.tipo} onChange={e => set('tipo', e.target.value)}>
                {Object.entries(TIPOS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Estado</label>
              <select className="form-select" value={form.estado} onChange={e => set('estado', e.target.value)}>
                {Object.entries(ESTADOS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Canal</label>
              <select className="form-select" value={form.canal || ''} onChange={e => set('canal', e.target.value)}>
                <option value="">Seleccionar...</option>
                {Object.entries(CANALES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Modalidad</label>
              <select className="form-select" value={form.modalidad || ''} onChange={e => set('modalidad', e.target.value)}>
                <option value="">Seleccionar...</option>
                {Object.entries(MODALIDADES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
            {form.modalidad === 'virtual' && <div className="form-group full">
              <label className="form-label">Link de Reunión (Teams / Zoom / Meet)</label>
              <input className="form-input" value={form.link_reunion || ''} onChange={e => set('link_reunion', e.target.value)} placeholder="https://teams.microsoft.com/l/meetup-join/..." />
            </div>}
            <div className="form-group full">
              <label className="form-label">Categorías</label>
              <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'4px'}}>
                {CATEGORIAS_OPCIONES.map(cat => (
                  <label key={cat} style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'14px',padding:'6px 12px',borderRadius:'20px',border:'1px solid var(--border)',background:(form.categorias||[]).includes(cat)?'var(--accent)':'var(--surface)',color:(form.categorias||[]).includes(cat)?'#fff':'var(--text-secondary)',transition:'all 0.15s ease',fontWeight:500}}>
                    <input type="checkbox" checked={(form.categorias||[]).includes(cat)} onChange={e => { const cats = form.categorias || []; set('categorias', e.target.checked ? [...cats, cat] : cats.filter(c => c !== cat)); }} style={{display:'none'}} />
                    {cat}
                  </label>
                ))}
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha *</label>
              <input className="form-input" type="date" value={form.fecha} onChange={e => set('fecha', e.target.value)} />
            </div>
            {currentUser?.rol === 'admin' && (
              <div className="form-group">
                <label className="form-label">Formador</label>
                <select className="form-select" value={form.formador_id} onChange={e => set('formador_id', parseInt(e.target.value))}>
                  {users.filter(u => u.activo !== false).map(u => <option key={u.id} value={u.id}>{u.nombre}</option>)}
                </select>
              </div>
            )}
            <div className="form-group">
              <label className="form-label">Hora Inicio</label>
              <input className="form-input" type="time" value={form.hora_inicio} onChange={e => set('hora_inicio', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Hora Fin</label>
              <input className="form-input" type="time" value={form.hora_fin} onChange={e => set('hora_fin', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Cadena / Cliente</label>
              <input className="form-input" value={form.cadena} onChange={e => set('cadena', e.target.value)} placeholder="Ej: Farmacity" />
            </div>
            <div className="form-group">
              <label className="form-label">PDV / Sucursal</label>
              <input className="form-input" value={form.pdv_nombre} onChange={e => set('pdv_nombre', e.target.value)} placeholder="Ej: Farmacity Cabildo 2100" />
            </div>
            <div className="form-group">
              <label className="form-label">Dirección</label>
              <input className="form-input" value={form.pdv_direccion} onChange={e => set('pdv_direccion', e.target.value)} placeholder="Dirección del PDV" />
            </div>
            <div className="form-group">
              <label className="form-label">Ciudad</label>
              <input className="form-input" value={form.ciudad} onChange={e => set('ciudad', e.target.value)} placeholder="Ej: CABA" />
            </div>
            <div className="form-group">
              <label className="form-label">Asistentes Esperados</label>
              <input className="form-input" type="number" value={form.asistentes_esperados} onChange={e => set('asistentes_esperados', e.target.value)} placeholder="0" />
            </div>
            <div className="form-group full">
              <label className="form-label">Descripción</label>
              <textarea className="form-textarea" value={form.descripcion || ''} onChange={e => set('descripcion', e.target.value)} placeholder="Detalle de la formación..." />
            </div>
            <div className="form-group full">
              <label className="form-label">Notas</label>
              <textarea className="form-textarea" value={form.notas || ''} onChange={e => set('notas', e.target.value)} placeholder="Notas adicionales..." />
            </div>
          </div>
          <div className="form-actions">
            <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={saving || !form.titulo || !form.fecha}>
              {saving ? 'Guardando...' : (formacion ? 'Guardar Cambios' : 'Crear Formación')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DETAIL MODAL ───
function DetailModal({ show, formacion, onClose, onEdit, onDelete, onUploadFotos, currentUser }) {
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  if (!show || !formacion) return null;

  const canEdit = currentUser.rol === 'admin' || formacion.formador_id === currentUser.id;
  const f = formacion;

  const handleUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setUploading(true);
    await onUploadFotos(f.id, files);
    setUploading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{f.titulo}</div>
          <button className="modal-close" onClick={onClose}><Icons.Close /></button>
        </div>
        <div className="modal-body">
          <div className={`detail-status ${f.estado}`}>
            <span className="detail-status-dot"></span>
            {ESTADOS[f.estado]}
          </div>
          <div className="detail-info">
            <div className="detail-row">
              <div className="detail-icon"><Icons.Calendar /></div>
              <div><div className="detail-label">Fecha</div><div className="detail-value">{new Date(f.fecha + 'T12:00:00').toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div></div>
            </div>
            {f.hora_inicio && <div className="detail-row">
              <div className="detail-icon"><Icons.Clock /></div>
              <div><div className="detail-label">Horario</div><div className="detail-value">{f.hora_inicio?.slice(0,5)}{f.hora_fin ? ` – ${f.hora_fin.slice(0,5)}` : ''}</div></div>
            </div>}
            <div className="detail-row">
              <div className="detail-icon"><Icons.Tag /></div>
              <div><div className="detail-label">Tipo</div><div className="detail-value">{TIPOS[f.tipo]}</div></div>
            </div>
            {f.canal && <div className="detail-row">
              <div className="detail-icon"><Icons.Tag /></div>
              <div><div className="detail-label">Canal</div><div className="detail-value">{CANALES[f.canal] || f.canal}</div></div>
            </div>}
            {f.modalidad && <div className="detail-row">
              <div className="detail-icon"><Icons.Tag /></div>
              <div><div className="detail-label">Modalidad</div><div className="detail-value">{MODALIDADES[f.modalidad] || f.modalidad}</div></div>
            </div>}
            {f.link_reunion && <div className="detail-row">
              <div className="detail-icon" style={{background:'var(--info-light)'}}><Icons.Calendar /></div>
              <div><div className="detail-label">Link de Reunión</div><div className="detail-value"><a href={f.link_reunion} target="_blank" rel="noopener noreferrer" style={{color:'var(--info)',textDecoration:'none',fontWeight:600,display:'inline-flex',alignItems:'center',gap:'6px',padding:'6px 14px',background:'var(--info-light)',borderRadius:'8px',fontSize:'13px'}}>Unirse a la reunión ↗</a></div></div>
            </div>}
            {f.categorias && f.categorias.length > 0 && <div className="detail-row">
              <div className="detail-icon"><Icons.Tag /></div>
              <div><div className="detail-label">Categorías</div><div className="detail-value" style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>{f.categorias.map(c => <span key={c} style={{padding:'3px 10px',borderRadius:'12px',fontSize:'12px',background:'var(--accent-gold-light)',color:'var(--accent-gold)',fontWeight:600}}>{c}</span>)}</div></div>
            </div>}
            <div className="detail-row">
              <div className="detail-icon"><Icons.User /></div>
              <div><div className="detail-label">Formador</div><div className="detail-value">{f.formador?.nombre || '—'}</div></div>
            </div>
            {(f.cadena || f.pdv_nombre) && <div className="detail-row">
              <div className="detail-icon"><Icons.MapPin /></div>
              <div><div className="detail-label">Ubicación</div><div className="detail-value">{[f.cadena, f.pdv_nombre, f.ciudad].filter(Boolean).join(' · ')}</div>{f.pdv_direccion && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{f.pdv_direccion}</div>}</div>
            </div>}
            {f.asistentes_esperados && <div className="detail-row">
              <div className="detail-icon"><Icons.People /></div>
              <div><div className="detail-label">Asistentes</div><div className="detail-value">Esperados: {f.asistentes_esperados}{f.asistentes_reales != null ? ` · Reales: ${f.asistentes_reales}` : ''}</div></div>
            </div>}
            {f.descripcion && <div style={{marginTop:8}}><div className="detail-label">Descripción</div><p style={{fontSize:14,marginTop:4,color:'var(--text-secondary)'}}>{f.descripcion}</p></div>}
            {f.notas && <div style={{marginTop:8}}><div className="detail-label">Notas</div><p style={{fontSize:14,marginTop:4,color:'var(--text-secondary)'}}>{f.notas}</p></div>}

            {/* Fotos */}
            <div style={{marginTop:12}}>
              <div className="detail-label" style={{marginBottom:8}}>Fotos</div>
              {f.fotos && f.fotos.length > 0 && (
                <div className="fotos-grid">
                  {f.fotos.map((url, i) => (
                    <div key={i} className="foto-thumb"><img src={url} alt={`Foto ${i+1}`} /></div>
                  ))}
                </div>
              )}
              {canEdit && (
                <div className="upload-area" onClick={() => fileRef.current?.click()} style={{marginTop:10}}>
                  <Icons.Camera />
                  <p>{uploading ? 'Subiendo...' : 'Click para subir fotos'}</p>
                  <input ref={fileRef} type="file" multiple accept="image/*" onChange={handleUpload} style={{display:'none'}} />
                </div>
              )}
            </div>
          </div>

          {canEdit && (
            <div className="form-actions">
              <button className="btn btn-danger btn-sm" onClick={() => onDelete(f.id)}>
                <Icons.Trash /> Eliminar
              </button>
              <button className="btn btn-primary" onClick={() => onEdit(f)}>
                <Icons.Edit /> Editar
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── USER MODAL ───
function UserModal({ show, onClose, onSave }) {
  const [form, setForm] = useState({ nombre: '', email: '', password: '', rol: 'formador' });
  if (!show) return null;
  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:420}}>
        <div className="modal-header">
          <div className="modal-title">Nuevo Usuario</div>
          <button className="modal-close" onClick={onClose}><Icons.Close /></button>
        </div>
        <div className="modal-body">
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="form-group"><label className="form-label">Nombre</label><input className="form-input" value={form.nombre} onChange={e => set('nombre', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={form.email} onChange={e => set('email', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Contraseña</label><input className="form-input" type="password" value={form.password} onChange={e => set('password', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">Rol</label><select className="form-select" value={form.rol} onChange={e => set('rol', e.target.value)}><option value="formador">Formador</option><option value="admin">Admin</option></select></div>
          </div>
          <div className="form-actions">
            <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={() => onSave(form)} disabled={!form.nombre || !form.email || !form.password}>Crear Usuario</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cpd_user')); } catch { return null; }
  });
  const [page, setPage] = useState('calendario');
  const [view, setView] = useState('month');
  const [currentDate, setCurrentDate] = useState(new Date());
  const [formaciones, setFormaciones] = useState([]);
  const [users, setUsers] = useState([]);
  const [stats, setStats] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [editingFormacion, setEditingFormacion] = useState(null);
  const [selectedFormacion, setSelectedFormacion] = useState(null);
  const [showDetail, setShowDetail] = useState(false);
  const [showUserModal, setShowUserModal] = useState(false);
  const [filterEstado, setFilterEstado] = useState('');
  const [filterFormador, setFilterFormador] = useState('');
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const showToast = (message, type = 'success') => setToast({ message, type });

  const loadFormaciones = useCallback(async () => {
    try {
      const m = currentDate.getMonth() + 1;
      const y = currentDate.getFullYear();
      const params = { mes: m, anio: y };
      if (filterEstado) params.estado = filterEstado;
      if (filterFormador) params.formador_id = filterFormador;
      const data = await API.getFormaciones(params);
      setFormaciones(data);
    } catch (e) { console.error(e); }
  }, [currentDate, filterEstado, filterFormador]);

  const loadUsers = async () => {
    try { const data = await API.getUsers(); setUsers(data); } catch (e) {}
  };

  const loadStats = async () => {
    try {
      const m = currentDate.getMonth() + 1;
      const y = currentDate.getFullYear();
      const data = await API.getStats({ mes: m, anio: y });
      setStats(data);
    } catch (e) {}
  };

  useEffect(() => { if (user) { loadFormaciones(); loadUsers(); } }, [user, currentDate, filterEstado, filterFormador]);
  useEffect(() => { if (user && page === 'estadisticas') loadStats(); }, [page, currentDate]);

  const handleSaveFormacion = async (data) => {
    try {
      if (editingFormacion?.id) {
        await API.updateFormacion(editingFormacion.id, data);
        showToast('Formación actualizada');
      } else {
        await API.createFormacion(data);
        showToast('Formación creada');
      }
      setShowModal(false);
      setEditingFormacion(null);
      loadFormaciones();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const handleDelete = async (id) => {
    if (!confirm('¿Eliminar esta formación?')) return;
    try {
      await API.deleteFormacion(id);
      showToast('Formación eliminada');
      setShowDetail(false);
      loadFormaciones();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const handleUploadFotos = async (id, files) => {
    try {
      await API.uploadFotos(id, files);
      showToast('Fotos subidas');
      const updated = await API.getFormacion(id);
      setSelectedFormacion(updated);
      loadFormaciones();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const handleCreateUser = async (data) => {
    try {
      await API.createUser(data);
      showToast('Usuario creado');
      setShowUserModal(false);
      loadUsers();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const logout = () => {
    localStorage.removeItem('cpd_token');
    localStorage.removeItem('cpd_user');
    setUser(null);
  };

  const exportToExcel = async () => {
    try {
      const m = currentDate.getMonth() + 1;
      const y = currentDate.getFullYear();
      const params = { mes: m, anio: y };
      if (filterEstado) params.estado = filterEstado;
      if (filterFormador) params.formador_id = filterFormador;
      const token = localStorage.getItem('cpd_token');
      const res = await fetch(`${window.location.origin}/api/export?${new URLSearchParams(params)}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const rows = await res.json();
      if (!rows.length) { showToast('No hay datos para exportar', 'error'); return; }

      const headers = Object.keys(rows[0]);
      const csvContent = [
        headers.join(';'),
        ...rows.map(row => headers.map(h => {
          let val = row[h] != null ? String(row[h]) : '';
          val = val.replace(/"/g, '""');
          if (val.includes(';') || val.includes('"') || val.includes('\n')) val = `"${val}"`;
          return val;
        }).join(';'))
      ].join('\n');

      const BOM = '\uFEFF';
      const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Formaciones_CPD_${MESES[currentDate.getMonth()]}_${currentDate.getFullYear()}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Excel exportado correctamente');
    } catch (e) {
      showToast('Error al exportar: ' + e.message, 'error');
    }
  };

  const navMonth = (dir) => {
    const d = new Date(currentDate);
    d.setMonth(d.getMonth() + dir);
    setCurrentDate(d);
  };

  const navWeek = (dir) => {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + (7 * dir));
    setCurrentDate(d);
  };

  const navDay = (dir) => {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + dir);
    setCurrentDate(d);
  };

  if (!user) return <LoginScreen onLogin={setUser} />;

  // Calendar helpers
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const totalDays = lastDay.getDate();
  const today = new Date();

  const calendarDays = [];
  // Previous month days
  const prevLast = new Date(year, month, 0).getDate();
  for (let i = startOffset - 1; i >= 0; i--) calendarDays.push({ day: prevLast - i, month: month - 1, otherMonth: true });
  // Current month
  for (let d = 1; d <= totalDays; d++) calendarDays.push({ day: d, month: month, otherMonth: false });
  // Next month fill
  const remaining = 42 - calendarDays.length;
  for (let d = 1; d <= remaining; d++) calendarDays.push({ day: d, month: month + 1, otherMonth: true });

  const getEventsForDay = (day, mon) => {
    const y = mon < 0 ? year - 1 : (mon > 11 ? year + 1 : year);
    const m = ((mon % 12) + 12) % 12;
    return formaciones.filter(f => {
      const fd = new Date(f.fecha + 'T12:00:00');
      return fd.getDate() === day && fd.getMonth() === m && fd.getFullYear() === y;
    });
  };

  // Week view helpers
  const getWeekDays = () => {
    const d = new Date(currentDate);
    const dayOfWeek = (d.getDay() + 6) % 7;
    const monday = new Date(d);
    monday.setDate(d.getDate() - dayOfWeek);
    const days = [];
    for (let i = 0; i < 7; i++) {
      const wd = new Date(monday);
      wd.setDate(monday.getDate() + i);
      days.push(wd);
    }
    return days;
  };

  const weekDays = getWeekDays();
  const getWeekLabel = () => {
    const start = weekDays[0];
    const end = weekDays[6];
    if (start.getMonth() === end.getMonth()) return `${start.getDate()} – ${end.getDate()} ${MESES[start.getMonth()]} ${start.getFullYear()}`;
    return `${start.getDate()} ${MESES[start.getMonth()].slice(0,3)} – ${end.getDate()} ${MESES[end.getMonth()].slice(0,3)} ${start.getFullYear()}`;
  };

  const openDetail = (f) => { setSelectedFormacion(f); setShowDetail(true); };
  const openEdit = (f) => { setShowDetail(false); setEditingFormacion(f); setShowModal(true); };
  const openNew = (dateStr) => { setEditingFormacion(dateStr ? { fecha: dateStr } : null); setShowModal(true); };

  const pageTitles = { calendario: 'Calendario', estadisticas: 'Estadísticas', equipo: 'Equipo' };

  return (
    <div className="app-shell">
      {/* Sidebar */}
      <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="sidebar-header">
          <div className="sidebar-brand">Formaciones CPD</div>
          <div className="sidebar-sub">L'Oréal · Nexxbio</div>
        </div>
        <div className="sidebar-nav">
          <div className={`nav-item ${page === 'calendario' ? 'active' : ''}`} onClick={() => { setPage('calendario'); setSidebarOpen(false); }}>
            <Icons.Calendar /> Calendario
          </div>
          <div className={`nav-item ${page === 'estadisticas' ? 'active' : ''}`} onClick={() => { setPage('estadisticas'); setSidebarOpen(false); }}>
            <Icons.Chart /> Estadísticas
          </div>
          {user.rol === 'admin' && (
            <div className={`nav-item ${page === 'equipo' ? 'active' : ''}`} onClick={() => { setPage('equipo'); setSidebarOpen(false); }}>
              <Icons.Users /> Equipo
            </div>
          )}
        </div>
        <div className="sidebar-footer">
          <div className="user-info">
            <div className="user-avatar">{user.nombre?.charAt(0)}</div>
            <div>
              <div className="user-name">{user.nombre}</div>
              <div className="user-role">{user.rol}</div>
            </div>
          </div>
          <div className="nav-item" onClick={logout} style={{marginTop:4}}>
            <Icons.Logout /> Cerrar Sesión
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="mobile-menu-btn" onClick={() => setSidebarOpen(!sidebarOpen)}><Icons.Menu /></button>
            <div className="topbar-title">{pageTitles[page]}</div>
          </div>
          <div className="topbar-actions">
            <button className="btn btn-secondary" onClick={exportToExcel}>
              <Icons.Download /> Exportar Excel
            </button>
            <button className="btn btn-primary" onClick={() => openNew()}>
              <Icons.Plus /> Nueva Formación
            </button>
          </div>
        </div>

        {/* CALENDAR PAGE */}
        {page === 'calendario' && (
          <div className="calendar-container">
            <div className="calendar-header">
              <div className="calendar-nav">
                <button className="btn btn-ghost btn-icon" onClick={() => view === 'month' ? navMonth(-1) : view === 'week' ? navWeek(-1) : navDay(-1)}><Icons.ChevLeft /></button>
                <div className="calendar-month">{view === 'month' ? `${MESES[month]} ${year}` : view === 'week' ? getWeekLabel() : currentDate.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
                <button className="btn btn-ghost btn-icon" onClick={() => view === 'month' ? navMonth(1) : view === 'week' ? navWeek(1) : navDay(1)}><Icons.ChevRight /></button>
                <button className="btn btn-secondary btn-sm" onClick={() => setCurrentDate(new Date())}>Hoy</button>
              </div>
              <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                <div className="calendar-filters">
                  <span className={`filter-chip ${!filterEstado ? 'active' : ''}`} onClick={() => setFilterEstado('')}>Todas</span>
                  {Object.entries(ESTADOS).map(([k,v]) => (
                    <span key={k} className={`filter-chip ${filterEstado === k ? 'active' : ''}`} onClick={() => setFilterEstado(filterEstado === k ? '' : k)}>{v}</span>
                  ))}
                </div>
                <select className="form-select" value={filterFormador} onChange={e => setFilterFormador(e.target.value)} style={{padding:'6px 12px',fontSize:'12px',borderRadius:'20px',border:'1px solid var(--border)',minWidth:'160px',fontWeight:500}}>
                  <option value="">Todos los formadores</option>
                  {users.filter(u => u.activo !== false).map(u => <option key={u.id} value={u.id}>{u.nombre}</option>)}
                </select>
                <div className="view-toggle">
                  <button className={`view-btn ${view === 'month' ? 'active' : ''}`} onClick={() => setView('month')}>Mes</button>
                  <button className={`view-btn ${view === 'week' ? 'active' : ''}`} onClick={() => setView('week')}>Semana</button>
                  <button className={`view-btn ${view === 'day' ? 'active' : ''}`} onClick={() => setView('day')}>Día</button>
                </div>
              </div>
            </div>

            {view === 'month' ? (
              <div className="calendar-grid">
                <div className="calendar-weekdays">
                  {DIAS.map(d => <div key={d} className="weekday">{d}</div>)}
                </div>
                <div className="calendar-days">
                  {calendarDays.map((cd, i) => {
                    const events = getEventsForDay(cd.day, cd.month);
                    const isToday = !cd.otherMonth && cd.day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                    const dateStr = `${year}-${String(((cd.month % 12 + 12) % 12) + 1).padStart(2,'0')}-${String(cd.day).padStart(2,'0')}`;
                    return (
                      <div key={i} className={`calendar-day ${cd.otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}`} onDoubleClick={() => !cd.otherMonth && openNew(dateStr)}>
                        <div className="day-number">{cd.day}</div>
                        <div className="day-events">
                          {events.slice(0, 3).map(ev => (
                            <div key={ev.id} className={`day-event ${ev.estado}`} onClick={() => openDetail(ev)}>
                              {ev.hora_inicio?.slice(0,5)} {ev.titulo}
                            </div>
                          ))}
                          {events.length > 3 && <div className="day-more">+{events.length - 3} más</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : (
              <div className="weekly-grid">
                <div className="weekly-header">
                  {weekDays.map((wd, i) => {
                    const isToday = wd.toDateString() === today.toDateString();
                    return (
                      <div key={i} className={`weekly-day-header ${isToday ? 'today' : ''}`}>
                        <div className="weekly-day-name">{DIAS[i]}</div>
                        <div className="weekly-day-num">{wd.getDate()}</div>
                      </div>
                    );
                  })}
                </div>
                <div className="weekly-body">
                  {weekDays.map((wd, i) => {
                    const events = formaciones.filter(f => {
                      const fd = new Date(f.fecha + 'T12:00:00');
                      return fd.toDateString() === wd.toDateString();
                    });
                    return (
                      <div key={i} className="weekly-column">
                        {events.map(ev => (
                          <div key={ev.id} className={`weekly-event ${ev.estado}`} onClick={() => openDetail(ev)}>
                            <div className="weekly-event-time">{ev.hora_inicio?.slice(0,5)}{ev.hora_fin ? ` – ${ev.hora_fin.slice(0,5)}` : ''}</div>
                            <div className="weekly-event-title">{ev.titulo}</div>
                            <div className="weekly-event-loc">{[ev.cadena, ev.pdv_nombre].filter(Boolean).join(' · ')}</div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {view === 'day' && (() => {
              const HOURS = Array.from({ length: 13 }, (_, i) => i + 8);
              const dayEvents = formaciones.filter(f => {
                const fd = new Date(f.fecha + 'T12:00:00');
                return fd.toDateString() === currentDate.toDateString();
              });
              const formadores = [...new Map(dayEvents.map(e => [e.formador?.id, e.formador])).values()].filter(Boolean);
              if (formadores.length === 0 && dayEvents.length === 0) {
                return (
                  <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1px solid var(--border-light)',padding:'60px 20px',textAlign:'center',boxShadow:'var(--shadow-sm)'}}>
                    <div style={{fontSize:'48px',marginBottom:'12px'}}>📭</div>
                    <div style={{fontSize:'16px',fontWeight:600,color:'var(--text)'}}>Sin formaciones este día</div>
                    <div style={{fontSize:'13px',color:'var(--text-muted)',marginTop:'6px'}}>Hacé doble click en un día del calendario mensual o creá una nueva formación</div>
                  </div>
                );
              }
              const allFormadores = users.filter(u => u.activo !== false && (u.rol === 'formador' || dayEvents.some(e => e.formador_id === u.id)));
              const displayFormadores = allFormadores.length > 0 ? allFormadores : formadores;

              const getEventStyle = (ev) => {
                const startH = ev.hora_inicio ? parseInt(ev.hora_inicio.split(':')[0]) : 8;
                const startM = ev.hora_inicio ? parseInt(ev.hora_inicio.split(':')[1]) : 0;
                const endH = ev.hora_fin ? parseInt(ev.hora_fin.split(':')[0]) : startH + 1;
                const endM = ev.hora_fin ? parseInt(ev.hora_fin.split(':')[1]) : 0;
                const top = ((startH - 8) * 60 + startM) * (60/60);
                const height = Math.max(((endH - startH) * 60 + (endM - startM)) * (60/60), 30);
                return { top: `${top}px`, height: `${height}px` };
              };

              const COLORS = ['#2874A6', '#8B6914', '#2D7A4F', '#9B59B6', '#E67E22', '#C0392B'];

              return (
                <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',border:'1px solid var(--border-light)',overflow:'hidden',boxShadow:'var(--shadow-sm)'}}>
                  <div style={{display:'grid',gridTemplateColumns:`80px repeat(${displayFormadores.length}, 1fr)`,borderBottom:'1px solid var(--border-light)',background:'var(--surface-alt)'}}>
                    <div style={{padding:'14px 12px',fontSize:'11px',fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',color:'var(--text-muted)'}}>Hora</div>
                    {displayFormadores.map((f, i) => (
                      <div key={f.id} style={{padding:'14px 12px',textAlign:'center',borderLeft:'1px solid var(--border-light)'}}>
                        <div style={{width:'28px',height:'28px',borderRadius:'50%',background:COLORS[i % COLORS.length],display:'inline-flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'12px',fontWeight:600,marginBottom:'4px'}}>{f.nombre?.charAt(0)}</div>
                        <div style={{fontSize:'12px',fontWeight:600}}>{f.nombre}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:`80px repeat(${displayFormadores.length}, 1fr)`,position:'relative'}}>
                    <div>
                      {HOURS.map(h => (
                        <div key={h} style={{height:'60px',padding:'4px 12px',fontSize:'11px',color:'var(--text-muted)',fontWeight:500,borderBottom:'1px solid var(--border-light)',display:'flex',alignItems:'flex-start'}}>{String(h).padStart(2,'0')}:00</div>
                      ))}
                    </div>
                    {displayFormadores.map((f, fi) => {
                      const fEvents = dayEvents.filter(e => e.formador_id === f.id);
                      return (
                        <div key={f.id} style={{position:'relative',borderLeft:'1px solid var(--border-light)'}}>
                          {HOURS.map(h => (
                            <div key={h} style={{height:'60px',borderBottom:'1px solid var(--border-light)'}}></div>
                          ))}
                          {fEvents.map(ev => {
                            const pos = getEventStyle(ev);
                            const bgColors = { planificada: 'var(--info-light)', confirmada: 'var(--warning-light)', realizada: 'var(--success-light)', cancelada: 'var(--danger-light)' };
                            const borderColors = { planificada: 'var(--planificada)', confirmada: 'var(--confirmada)', realizada: 'var(--realizada)', cancelada: 'var(--cancelada)' };
                            return (
                              <div key={ev.id} onClick={() => { setSelectedFormacion(ev); setShowDetail(true); }} style={{position:'absolute',top:pos.top,height:pos.height,left:'4px',right:'4px',background:bgColors[ev.estado],borderLeft:`3px solid ${borderColors[ev.estado]}`,borderRadius:'6px',padding:'6px 8px',cursor:'pointer',overflow:'hidden',fontSize:'11px',transition:'transform 0.1s ease',zIndex:2}} onMouseEnter={e => e.currentTarget.style.transform='scale(1.02)'} onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
                                <div style={{fontWeight:600,fontSize:'11px'}}>{ev.hora_inicio?.slice(0,5)} – {ev.hora_fin?.slice(0,5)}</div>
                                <div style={{fontWeight:500,marginTop:'2px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.titulo}</div>
                                {parseFloat(pos.height) > 50 && <div style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'2px'}}>{ev.cadena}{ev.modalidad === 'virtual' ? ' 🖥️' : ''}</div>}
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* STATS PAGE */}
        {page === 'estadisticas' && stats && (
          <div className="stats-container">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
              <div className="calendar-nav">
                <button className="btn btn-ghost btn-icon" onClick={() => navMonth(-1)}><Icons.ChevLeft /></button>
                <div className="calendar-month">{MESES[month]} {year}</div>
                <button className="btn btn-ghost btn-icon" onClick={() => navMonth(1)}><Icons.ChevRight /></button>
              </div>
            </div>
            <div className="stats-grid">
              <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value">{stats.total}</div><div className="stat-sub">formaciones</div></div>
              <div className="stat-card"><div className="stat-label">Realizadas</div><div className="stat-value" style={{color:'var(--realizada)'}}>{stats.realizadas}</div><div className="stat-sub">{stats.total ? Math.round(stats.realizadas/stats.total*100) : 0}% cumplimiento</div></div>
              <div className="stat-card"><div className="stat-label">Planificadas</div><div className="stat-value" style={{color:'var(--planificada)'}}>{stats.planificadas}</div><div className="stat-sub">pendientes</div></div>
              <div className="stat-card"><div className="stat-label">Confirmadas</div><div className="stat-value" style={{color:'var(--confirmada)'}}>{stats.confirmadas}</div><div className="stat-sub">próximas</div></div>
              <div className="stat-card"><div className="stat-label">Canceladas</div><div className="stat-value" style={{color:'var(--cancelada)'}}>{stats.canceladas}</div><div className="stat-sub">{stats.total ? Math.round(stats.canceladas/stats.total*100) : 0}% del total</div></div>
            </div>

            {stats.porFormador?.length > 0 && (
              <div style={{marginTop:24}}>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:14}}>Por Formador</h3>
                <div className="table-wrapper">
                  <table className="table">
                    <thead><tr><th>Formador</th><th>Formaciones</th></tr></thead>
                    <tbody>
                      {stats.porFormador.map((pf, i) => (
                        <tr key={i}><td>{pf.formador?.nombre || '—'}</td><td>{pf.dataValues?.total || pf.total}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {stats.porTipo?.length > 0 && (
              <div style={{marginTop:24}}>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:14}}>Por Tipo</h3>
                <div className="table-wrapper">
                  <table className="table">
                    <thead><tr><th>Tipo</th><th>Cantidad</th></tr></thead>
                    <tbody>
                      {stats.porTipo.map((pt, i) => (
                        <tr key={i}><td>{TIPOS[pt.tipo] || pt.tipo}</td><td>{pt.dataValues?.total || pt.total}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* TEAM PAGE */}
        {page === 'equipo' && user.rol === 'admin' && (
          <div className="users-container">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>Equipo de Formadores</h3>
              <button className="btn btn-primary" onClick={() => setShowUserModal(true)}><Icons.Plus /> Nuevo Usuario</button>
            </div>
            <div className="table-wrapper">
              <table className="table">
                <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id}>
                      <td style={{fontWeight:500}}>{u.nombre}</td>
                      <td>{u.email}</td>
                      <td><span className={`role-badge ${u.rol}`}>{u.rol}</span></td>
                      <td>{u.activo ? '✓ Activo' : '✗ Inactivo'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {/* Modals */}
      <FormacionModal show={showModal} onClose={() => { setShowModal(false); setEditingFormacion(null); }} onSave={handleSaveFormacion} formacion={editingFormacion} users={users} currentUser={user} />
      <DetailModal show={showDetail} formacion={selectedFormacion} onClose={() => setShowDetail(false)} onEdit={openEdit} onDelete={handleDelete} onUploadFotos={handleUploadFotos} currentUser={user} />
      <UserModal show={showUserModal} onClose={() => setShowUserModal(false)} onSave={handleCreateUser} />
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
